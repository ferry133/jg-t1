apiVersion: v1
kind: Config
clusters:
  - cluster:
      server: https://omni-k8s.janncot.duckdns.org
    name: jcom-k3
contexts:
  - context:
      cluster: jcom-k3
      namespace: default
      user: jcom-k3-ferry133@gmail.com
    name: jcom-k3
current-context: jcom-k3
users:
- name: jcom-k3-ferry133@gmail.com
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1
      args:
        - oidc-login
        - get-token
        - --oidc-issuer-url=https://omni.janncot.com/oidc
        - --oidc-client-id=native
        - --oidc-extra-scope=cluster:k3
      command: kubectl
      env: null
      interactiveMode: IfAvailable
      provideClusterInfo: false
