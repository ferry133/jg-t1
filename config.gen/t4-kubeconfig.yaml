apiVersion: v1
kind: Config
clusters:
  - cluster:
      server: https://omni-k8s.janncot.duckdns.org
    name: jcom-t4
contexts:
  - context:
      cluster: jcom-t4
      namespace: default
      user: jcom-t4-ferry133@gmail.com
    name: jcom-t4
current-context: jcom-t4
users:
- name: jcom-t4-ferry133@gmail.com
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      args:
        - oidc-login
        - get-token
        - --oidc-issuer-url=https://omni.janncot.com/oidc
        - --oidc-client-id=native
        - --oidc-extra-scope=cluster:t4
      command: kubectl
      env: null
      provideClusterInfo: false
